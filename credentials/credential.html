<!DOCTYPE html>
<html data-theme="dark">
<head>
  <title>Credential Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="card">
    <h2>Credential Manager</h2>

    <label for="userSelect">User</label>
    <select id="userSelect">
      <option value="">Select user</option>
    </select>

    <label for="categorySelect">Category</label>
    <select id="categorySelect">
      <option value="">Select category</option>
    </select>

    <label for="accountSelect">Account</label>
    <select id="accountSelect" disabled>
      <option value="">Select account</option>
    </select>

    <label for="usernameInput">Username</label>
    <input id="usernameInput" placeholder="Username">

    <label for="passwordInput">Password</label>
    <input id="passwordInput" type="password" placeholder="Password">

    <label for="noteInput">Note</label>
    <input id="noteInput" placeholder="Note">

    <button id="saveCredentialBtn" type="button">Save Credential</button>
  </div>

  <script type="module" src="./credentials.js"></script>
</body>
</html>
